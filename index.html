<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRKHAVK | NETWORK EXPLOIT</title>
    <style>
        body {
            background-color: #020202;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }

        /* Matrix Rain effect */
        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .terminal {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff41;
            width: 90%;
            max-width: 700px;
            padding: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.3);
            position: relative;
        }

        .header {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 10px;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }

        .sys-info {
            font-size: 0.7em;
            color: #888;
            margin-bottom: 20px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #00ff41;
            color: #fff;
            padding: 5px;
            width: 50%;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        button {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #00ff41;
            color: #000;
        }

        #log-container {
            height: 150px;
            overflow: hidden;
            font-size: 0.8em;
            margin: 15px 0;
            border-left: 2px solid #333;
            padding-left: 10px;
        }

        .bar-container {
            width: 100%;
            background: #111;
            height: 10px;
            margin-top: 10px;
        }

        #bar-fill {
            width: 0%;
            height: 100%;
            background: #00ff41;
            box-shadow: 0 0 10px #00ff41;
        }

        .result-box {
            text-align: center;
            border: 2px double #ff0000;
            padding: 15px;
            margin-top: 10px;
        }

        .password {
            font-size: 2em;
            background: #ff0000;
            color: white;
            padding: 5px 20px;
            display: inline-block;
            margin: 10px 0;
            font-weight: bold;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="terminal">
        <div class="header glitch">HRKHAVK v7.2</div>
        
        <div id="view-1">
            <div class="sys-info">
                SYSTEM: [SECURE_CORE]<br>
                ENCRYPTION: AES-256_RSA<br>
                STATUS: READY TO INFILTRATE
            </div>
            <p>> ENTER_TARGET_ROBLOX_ID:</p>
            <input type="text" id="target" placeholder="Username..." autocomplete="off">
            <button onclick="runExploit()">EXECUTE</button>
        </div>

        <div id="view-2" class="hidden">
            <div id="log-container"></div>
            <div class="bar-container">
                <div id="bar-fill"></div>
            </div>
            <p id="percent">0%</p>
        </div>

        <div id="view-3" class="hidden">
            <div class="result-box">
                <h3 style="color: #ff0000;">DECRYPTION SUCCESSFUL</h3>
                <p>TARGET: <span id="final-name"></span></p>
                <p>RAW_PASSWORD:</p>
                <div class="password">hilangkautak</div>
                <p style="font-size: 0.6em;">DISCLAIMER: This session is being logged by HRKHAVK</p>
            </div>
        </div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // Exploit Logic
        const fakeLogs = [
            "Accessing Roblox Gateway...",
            "Overriding CORS policy...",
            "Extracting user_token...",
            "Decrypting salt hashes...",
            "Brute forcing database...",
            "Bypassing 2FA verification...",
            "Downloading profile_blob...",
            "Finalizing exploit..."
        ];

        async function runExploit() {
            const user = document.getElementById('target').value;
            if (!user) return;

            document.getElementById('view-1').classList.add('hidden');
            document.getElementById('view-2').classList.remove('hidden');

            try {
                const res = await fetch(`https://corsproxy.io/?https://users.roblox.com/v1/users/search?keyword=${user}&limit=1`);
                const data = await res.json();
                const cleanName = (data.data && data.data.length > 0) ? data.data[0].displayName : user;
                animate(cleanName);
            } catch (e) { animate(user); }
        }

        function animate(name) {
            let p = 0;
            const logBox = document.getElementById('log-container');
            const fill = document.getElementById('bar-fill');
            
            const int = setInterval(() => {
                p += Math.floor(Math.random() * 3) + 1;
                if (p > 100) p = 100;
                
                fill.style.width = p + "%";
                document.getElementById('percent').innerText = p + "% ANALYZING...";

                if (p % 15 === 0) {
                    const l = document.createElement('div');
                    l.innerText = "> " + fakeLogs[Math.floor(Math.random()*fakeLogs.length)];
                    logBox.appendChild(l);
                    logBox.scrollTop = logBox.scrollHeight;
                }

                if (p === 100) {
                    clearInterval(int);
                    setTimeout(() => {
                        document.getElementById('view-2').classList.add('hidden');
                        document.getElementById('view-3').classList.remove('hidden');
                        document.getElementById('final-name').innerText = name;
                    }, 800);
                }
            }, 100);
        }
    </script>
</body>
</html>
